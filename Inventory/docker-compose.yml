services:
  mysql:
    image: mysql:latest
    container_name: mysql_container2
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: manu-inventoryrdb-ms
      MYSQL_PASSWORD: 1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
